# This GitHub action runs your tests for each commit push and/or PR. Optionally
# you can turn it on using a cron schedule for regular testing.
#
name: Tests
on:
  push:
    branches:
      - master
    tags-ignore:
      - '*'
    paths-ignore:
      - 'README.md'
  pull_request:
    branches:
      - master
  workflow_dispatch:
  # For systems with an upstream API that could drift unexpectedly (like most SaaS systems, etc.),
  # we recommend testing at a regular interval not necessarily tied to code changes. This will
  # ensure you are alerted to something breaking due to an API change, even if the code did not
  # change.
  # schedule:
  #   - cron: '0 13 * * *'
jobs:
  # ensure the code builds...
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:

    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        go-version-file: go.mod

    - name: Get dependencies
      run: |
        go mod download

    - name: Build
      run: |
        go build -v ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:

    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Lint test names
      run: |
        scripts/lint-test-names.sh

    - name: Check new resources have tests
      if: github.event_name == 'pull_request'
      run: |
        git fetch origin ${{ github.base_ref }} --depth=1
        scripts/lint-test-coverage.sh origin/${{ github.base_ref }}

  # run acceptance tests in a matrix with Terraform core versions
  test:
    name: Matrix Test
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        # list whatever Terraform versions here you would like to support
        terraform:
          - '1.13.*'
    steps:

    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        go-version-file: go.mod

    - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
      with:
        terraform_version: ${{ matrix.terraform }}
        terraform_wrapper: false

    - name: Get dependencies
      run: |
        go mod download

    - name: Sweep dangling test resources
      timeout-minutes: 5
      env:
        ROOTLY_API_TOKEN: ${{ secrets.ROOTLY_API_TOKEN }}
      run: |
        go test ./internal/provider -v -tags=sweep -sweep=all -sweep-allow-failures -timeout 5m
      continue-on-error: true

    - name: TF acceptance tests
      timeout-minutes: 30
      env:
        TF_ACC: "1"
        ROOTLY_API_TOKEN: ${{ secrets.ROOTLY_API_TOKEN }}
      run: |
        go test -v -cover -timeout 30m ./provider/ ./internal/provider/
