name: Docs Drift Check

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'README.md'
  pull_request:
    branches:
      - master

jobs:
  docs-drift:
    name: Docs Drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: '1.13.*'
          terraform_wrapper: false

      - name: Build provider
        run: go build -o terraform-provider-rootly

      - name: Generate docs
        run: |
          terraform fmt -recursive examples
          go tool tfplugindocs generate --provider-name rootly --rendered-provider-name terraform-provider-rootly
          mv ./docs/data-sources/ip_ranges.md ./docs/data-sources/ip_range.md 2>/dev/null || true
          rm -f ./docs/data-sources/ip_ranges.md
          mv ./docs/data-sources/ip_range.md ./docs/data-sources/ip_ranges.md
          find ./docs/resources/*.md -type f -exec node tools/clean-docs.js {} \;
          find ./docs/resources/ -type f -name 'workflow_task_*.md' -exec perl -pi -e 's/subcategory:$$/subcategory: Workflow Tasks/g' {} +
          find ./docs/resources/ -type f -name 'workflow_*.md' -exec perl -pi -e 's/subcategory:$$/subcategory: Workflows/g' {} +

      - name: Check for drift
        run: |
          if ! git diff --quiet docs/ examples/; then
            echo "::error::Documentation drift detected. Run 'make docs' and commit the changes."
            echo ""
            echo "Changed files:"
            git diff --name-only docs/ examples/
            echo ""
            echo "Diff:"
            git diff docs/ examples/
            exit 1
          fi
          echo "No documentation drift detected."
