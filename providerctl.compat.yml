version: 1

# Global compatibility rules:
# - fix spec issues before generation
# - pin naming where inflection is wrong
# - keep today's manual/excluded boundaries explicit
normalization:
  merge_object_anyof: true
  merge_object_oneof: true
  simplify_string_parameter_anyof: true

  renames:
    escalation_policy_level: escalation_level
    escalation_policy_path: escalation_path

  parameter_overrides:
    "/v1/incidents":
      get:
        "filter[private]":
          type: boolean

  synthetic_fields:
    catalog_entity:
      catalog_id:
        type: string
        description: The ID of the parent catalog
        terraform:
          force_new: true

# Naming exceptions for resources that do not follow normal inflection rules.
naming:
  resources:
    team:
      jsonapi_type: groups
      go_type: Team
      go_type_plural: Teams
      operations:
        list: listTeams
        get: getTeam
    alerts_source:
      jsonapi_type: alert_sources
    post_mortem_template:
      go_type: PostmortemTemplate
      go_type_plural: PostmortemTemplates

# Provider-wide Terraform behavior that should apply everywhere.
terraform:
  defaults:
    ignore_fields:
      - created_at
      - updated_at

# Discovery rules copied from the current JS generator so migration stays safe.
discovery:
